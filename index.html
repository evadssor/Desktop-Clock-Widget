<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clock Widget</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="widget-shell" id="widgetShell">
      <div class="widget-card face-digital" id="widgetCard">
        <header class="widget-header">
          <button class="ghost-button drag-handle" id="dragHandle" title="Drag widget">Move</button>
          <div class="status-group">
            <span class="status-pill" id="syncStatus">Syncing...</span>
            <button class="ghost-button" id="toggleSettings" title="Toggle settings">Settings</button>
          </div>
        </header>

        <main class="clock-panel">
          <div class="timezone-label" id="timezoneLabel">America/New_York</div>
          <div class="clock-readout" id="clockReadout">--:--:--</div>
          <div class="date-readout" id="dateReadout">Loading date...</div>
        </main>

        <section class="settings-panel hidden" id="settingsPanel">
          <label>
            <span>Time Zone</span>
            <select id="timezoneSelect"></select>
          </label>

          <label>
            <span>Time Format</span>
            <select id="hourModeSelect">
              <option value="12">AM / PM</option>
              <option value="24">Military Time</option>
            </select>
          </label>

          <label>
            <span>Clock Face</span>
            <select id="faceStyleSelect">
              <option value="digital">Digital</option>
              <option value="glass">Glass</option>
              <option value="retro">Retro</option>
            </select>
          </label>

          <label>
            <span>Accent Color</span>
            <input id="accentColorInput" type="color" />
          </label>

          <label>
            <span>Text Color</span>
            <input id="textColorInput" type="color" />
          </label>

          <label>
            <span>Background Color</span>
            <input id="backgroundColorInput" type="color" />
          </label>

          <label>
            <span>Background Opacity</span>
            <input id="opacityInput" type="range" min="0.15" max="1" step="0.01" />
          </label>

          <label>
            <span>Font Scale</span>
            <input id="fontScaleInput" type="range" min="0.8" max="1.5" step="0.05" />
          </label>

          <label class="toggle-row">
            <span>Show Seconds</span>
            <input id="showSecondsInput" type="checkbox" />
          </label>

          <label class="toggle-row">
            <span>Always on Top</span>
            <input id="alwaysOnTopInput" type="checkbox" />
          </label>
        </section>
      </div>
    </div>
    <script src="renderer.js"></script>
  </body>
</html>
